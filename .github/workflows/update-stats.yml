name: Update GitHub Stats

on:
  schedule:
    - cron: "0 * * * *"   # cada hora
  workflow_dispatch:      # permite botón "Run workflow" manual

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Update GitHub Stats
        run: |
          curl -o stats.svg "https://github-readme-stats.vercel.app/api?username=ThomasSan15&show_icons=true&theme=radical&hide_border=true&bg_color=0d1117&title_color=ff0000&text_color=ffffff&icon_color=ff0000"
        
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add stats.svg
          git commit -m "Update stats" || echo "No changes"
          git push
