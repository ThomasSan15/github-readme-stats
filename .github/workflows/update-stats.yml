name: Update GitHub Stats

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Stats
        run: |
          mkdir -p generated
          curl -L -o generated/stats.svg "https://github-readme-stats.vercel.app/api?username=ThomasSan15&show_icons=true&theme=radical&hide_border=true"

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add generated/stats.svg
          git commit -m "Update GitHub Stats" || echo "No changes"
          git push
