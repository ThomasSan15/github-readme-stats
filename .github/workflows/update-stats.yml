name: Update GitHub Stats

on:
  schedule:
    - cron: "0 */12 * * *"   # Cada 12 horas
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate Stats
        run: |
          mkdir -p generated
          curl -o generated/overview.svg "https://github-readme-stats.vercel.app/api?username=ThomasSan15&show_icons=true&theme=radical"
          curl -o generated/languages.svg "https://github-readme-stats.vercel.app/api/top-langs/?username=ThomasSan15&layout=compact&theme=radical"

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add generated/*.svg
          git commit -m "Update GitHub stats" || echo "No changes"
          git push
